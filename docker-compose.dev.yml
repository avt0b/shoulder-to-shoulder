version: '3.9'

# Development overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  user_service:
    volumes:
      - ./backend/user_service:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENVIRONMENT: development

  notification_service:
    volumes:
      - ./backend/notification_service:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      ENVIRONMENT: development

  event_service:
    volumes:
      - ./backend/event_service:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    environment:
      ENVIRONMENT: development

  admin_service:
    volumes:
      - ./backend/admin_service:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    environment:
      ENVIRONMENT: development

  maps_service:
    volumes:
      - ./backend/maps_service:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload
    environment:
      ENVIRONMENT: development

  frontend:
    volumes:
      - ./frontend/authorization:/app
      - /app/node_modules
