services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  nats:
    extends:
      file: docker-compose.yml
      service: nats

  minio:
    extends:
      file: docker-compose.yml
      service: minio

  user_service:
    extends:
      file: docker-compose.yml
      service: user_service
    volumes:
      - ${PROJECT_ROOT}:${APP_HOME}
    command: >
      sh -lc "/opt/shoulder-to-shoulder-venv/bin/python -m uvicorn backend.user_service.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload-dir ${APP_HOME}/backend/user_service
      --reload"

  notification_service:
    extends:
      file: docker-compose.yml
      service: notification_service
    volumes:
      - ${PROJECT_ROOT}:${APP_HOME}
    command: >
      sh -lc "/opt/shoulder-to-shoulder-venv/bin/python -m uvicorn backend.notification_service.app.main:app
      --host 0.0.0.0
      --port 8001
      --reload-dir ${APP_HOME}/backend/notification_service
      --reload"

  event_service:
    extends:
      file: docker-compose.yml
      service: event_service
    volumes:
      - ${PROJECT_ROOT}:${APP_HOME}
    command: >
      sh -lc "/opt/shoulder-to-shoulder-venv/bin/python -m uvicorn backend.event_service.app.main:app
      --host 0.0.0.0
      --port 8002
      --reload-dir ${APP_HOME}/backend/event_service
      --reload"

  admin_service:
    extends:
      file: docker-compose.yml
      service: admin_service
    volumes:
      - ${PROJECT_ROOT}:${APP_HOME}
    command: >
      sh -lc "/opt/shoulder-to-shoulder-venv/bin/python -m uvicorn backend.admin_service.app.main:app
      --host 0.0.0.0
      --port 8003
      --reload-dir ${APP_HOME}/backend/admin_service
      --reload"

  media_service:
    extends:
      file: docker-compose.yml
      service: media_service
    volumes:
      - ${PROJECT_ROOT}:${APP_HOME}
    command: >
      sh -lc "/opt/shoulder-to-shoulder-venv/bin/python -m uvicorn backend.media_service.app.main:app
      --host 0.0.0.0
      --port 8006
      --reload-dir ${APP_HOME}/backend/media_service
      --reload"

  gateway_service:
    extends:
      file: docker-compose.yml
      service: gateway_service
    volumes:
      - ${PROJECT_ROOT}:${APP_HOME}
    command: >
      sh -lc "/opt/shoulder-to-shoulder-venv/bin/python -m uvicorn backend.gateway.main:app
      --host 0.0.0.0
      --port 8005
      --reload-dir ${APP_HOME}/backend/gateway
      --reload"

  frontend:
    extends:
      file: docker-compose.yml
      service: frontend
    working_dir: ${APP_HOME}/frontend/app
    volumes:
      - ${PROJECT_ROOT}/frontend/app:${APP_HOME}/frontend/app
      - s2s_frontend_node_modules:${APP_HOME}/frontend/app/node_modules
    command: >
      sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"

  maps_service:
    extends:
      file: docker-compose.yml
      service: maps_service

volumes:
  s2s_frontend_node_modules:

networks:
  s2s_network:
    driver: bridge
