name: Dependency Check & Updates

on:
  schedule:
    # Every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-python-deps:
    name: Check Python Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit

      - name: Check for vulnerabilities with safety
        run: |
          pip install -e .
          safety check --file pyproject.toml
        continue-on-error: true

      - name: Check for vulnerabilities with pip-audit
        run: pip-audit
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Dependency vulnerabilities detected',
              body: `Vulnerabilities were detected in Python dependencies.\nPlease review the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['security', 'dependencies']
            })

  check-node-deps:
    name: Check Node.js Dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/authorization/package-lock.json'

      - name: Install dependencies
        working-directory: frontend/authorization
        run: npm ci

      - name: Run npm audit
        working-directory: frontend/authorization
        run: npm audit
        continue-on-error: true

      - name: Check for outdated packages
        working-directory: frontend/authorization
        run: npm outdated
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Frontend dependency vulnerabilities detected',
              body: `Vulnerabilities were detected in Node.js dependencies.\nPlease review the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['security', 'dependencies', 'frontend']
            })

  update-deps:
    name: Update Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Update Python dependencies
        run: |
          # Update lock file
          uv pip compile pyproject.toml --upgrade -o uv.lock

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/authorization/package-lock.json'

      - name: Update Node dependencies
        working-directory: frontend/authorization
        run: |
          npm update
          npm install

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update dependencies'
          title: 'chore: update dependencies'
          body: |
            ## 📦 Dependency Updates

            This PR contains updates to both Python and Node.js dependencies.

            ### Python
            - Updated via `uv pip compile`

            ### Node.js
            - Updated via `npm update`

            **Note:** Please review changes and run tests before merging.
          branch: chore/update-dependencies
          delete-branch: true
          labels: |
            dependencies
            automation
