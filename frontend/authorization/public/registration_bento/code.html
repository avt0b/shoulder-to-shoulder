<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f5; /* surface-container-low */
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "surface-container-low": "#f3f4f5",
                "secondary": "#924a31",
                "tertiary": "#0051af",
                "inverse-primary": "#ffb59d",
                "primary-fixed": "#ffdbd0",
                "secondary-container": "#fea182",
                "primary-container": "#c2410c",
                "on-primary-fixed-variant": "#832600",
                "on-secondary": "#ffffff",
                "on-background": "#191c1d",
                "surface-dim": "#d9dadb",
                "on-error": "#ffffff",
                "on-secondary-container": "#78351e",
                "error-container": "#ffdad6",
                "surface-variant": "#e1e3e4",
                "on-primary-container": "#ffece7",
                "on-secondary-fixed": "#390c00",
                "on-primary-fixed": "#390c00",
                "on-error-container": "#93000a",
                "on-tertiary-fixed": "#001a41",
                "primary": "#9b2f00",
                "on-tertiary-container": "#ecf0ff",
                "tertiary-container": "#0069de",
                "surface-container-high": "#e7e8e9",
                "surface-bright": "#f8f9fa",
                "primary-fixed-dim": "#ffb59d",
                "secondary-fixed": "#ffdbd0",
                "surface-tint": "#ac3400",
                "on-surface-variant": "#59413a",
                "surface-container-highest": "#e1e3e4",
                "secondary-fixed-dim": "#ffb59d",
                "on-secondary-fixed-variant": "#75331c",
                "outline": "#8d7168",
                "error": "#ba1a1a",
                "outline-variant": "#e1bfb5",
                "inverse-on-surface": "#f0f1f2",
                "inverse-surface": "#2e3132",
                "tertiary-fixed-dim": "#adc6ff",
                "on-surface": "#191c1d",
                "on-tertiary-fixed-variant": "#004494",
                "surface-container-lowest": "#ffffff",
                "on-primary": "#ffffff",
                "surface-container": "#edeeef",
                "on-tertiary": "#ffffff",
                "surface": "#f8f9fa",
                "tertiary-fixed": "#d8e2ff",
                "background": "#f8f9fa"
            },
            "borderRadius": {
                "DEFAULT": "1rem",
                "lg": "2rem",
                "xl": "3rem",
                "full": "9999px"
            }
          }
        }
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-stone-50 flex items-center px-4 py-3 h-16 w-full">
<button class="material-symbols-outlined text-orange-700 p-2 hover:bg-stone-100 rounded-full transition-colors active:scale-95 duration-150" data-icon="arrow_back">arrow_back</button>
<h1 class="ml-4 font-['Inter'] font-semibold text-lg tracking-tight text-stone-500">Регистрация</h1>
<div class="ml-auto font-bold italic text-orange-700">Shoulder to Shoulder</div>
</header>
<main class="pt-20 pb-10 px-4 max-w-lg mx-auto">
<!-- Hero Branding Section -->
<div class="mb-8 mt-4 text-left">
<h2 class="text-[2.75rem] font-bold text-on-surface leading-tight tracking-tighter">The Collective Pulse.</h2>
<p class="text-on-surface-variant mt-2 text-body-md opacity-80">Присоединяйтесь к сообществу единомышленников.</p>
</div>
<!-- Bento Grid Registration Form -->
<div class="grid grid-cols-2 gap-4">
<!-- Phone Number Cell -->
<div class="col-span-2 bg-surface-container-lowest rounded-lg p-3 relative overflow-hidden group">
<div class="absolute inset-0 opacity-10 pointer-events-none">
<img class="w-full h-full object-cover grayscale opacity-30" data-alt="Subtle abstract background with organic textures and soft orange hues reflecting a sense of community energy" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzFx1IJ-2_VcweBKCWwKqia4fNXpVg6kJDdkSUzOGz2HsKy3UcpY6PCo_Q7kJnTckasi3PZsj_8nbYfSl3beGRc4-vmy-Wrc1mCJLdw4OP5kGSlFa8aqgWRTpCjezRpVEpYCbtZbne2W7OPnr0lPsVlcUNboWp8YuSeunAeBSqY9YlPrqEcMntqBYatwlISHk3pZGAAaM2MaBb933P_U3YQEVYG4Mo6JAP_g68td3vsWnyqucZYnB-60Cd3c89Us_yz5OIdn5USJ0"/>
</div>
<div class="relative z-10">
<label class="block text-label-sm font-medium text-on-surface-variant mb-1 uppercase tracking-wider">Номер телефона</label>
<input class="w-full bg-transparent border-none p-0 text-title-md font-medium text-on-surface focus:ring-0 placeholder:text-surface-variant" placeholder="+7 (900) 000-00-00" type="tel"/>
</div>
</div>
<!-- Login Cell -->
<div class="col-span-2 md:col-span-1 bg-surface-container-lowest rounded-lg p-3 border-l-4 border-primary">
<label class="block text-label-sm font-medium text-on-surface-variant mb-1 uppercase tracking-wider">Логин</label>
<input class="w-full bg-transparent border-none p-0 text-title-md font-medium text-on-surface focus:ring-0 placeholder:text-surface-variant" placeholder="username" type="text"/>
</div>
<!-- Empty Accent Cell (Editorial Asymmetry) -->
<div class="hidden md:flex md:col-span-1 bg-primary-container rounded-lg p-3 items-end justify-start">
<span class="text-on-primary-container font-bold text-xl leading-none">JOIN THE<br/>FLOW</span>
</div>
<!-- Password Cell -->
<div class="col-span-2 bg-surface-container-lowest rounded-lg p-3">
<label class="block text-label-sm font-medium text-on-surface-variant mb-1 uppercase tracking-wider">Пароль</label>
<div class="flex items-center">
<input class="w-full bg-transparent border-none p-0 text-title-md font-medium text-on-surface focus:ring-0 placeholder:text-surface-variant" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-surface-variant cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Confirm Password Cell -->
<div class="col-span-2 bg-surface-container-lowest rounded-lg p-3">
<label class="block text-label-sm font-medium text-on-surface-variant mb-1 uppercase tracking-wider">Подтверждение пароля</label>
<input class="w-full bg-transparent border-none p-0 text-title-md font-medium text-on-surface focus:ring-0 placeholder:text-surface-variant" placeholder="••••••••" type="password"/>
</div>
<!-- Community Pulse Indicator (Decorative Bento Element) -->
<div class="col-span-1 bg-tertiary-fixed rounded-lg p-3 flex flex-col justify-between aspect-square">
<span class="material-symbols-outlined text-on-tertiary-fixed" data-icon="group">group</span>
<div>
<div class="text-[1.5rem] font-bold text-on-tertiary-fixed leading-none">1.2k+</div>
<div class="text-label-sm text-on-tertiary-fixed font-medium">Активных атлетов</div>
</div>
</div>
<!-- CTA Cell -->
<div class="col-span-1 bg-surface-container-high rounded-lg p-3 flex items-center justify-center">
<div class="text-center">
<span class="material-symbols-outlined text-primary text-3xl mb-1" data-icon="rocket_launch">rocket_launch</span>
<p class="text-label-sm font-semibold text-primary">Готовы начать?</p>
</div>
</div>
<!-- Primary Action Button -->
<div class="col-span-2 mt-2">
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-full font-bold text-lg shadow-lg active:scale-95 transition-transform duration-150 flex items-center justify-center gap-2">
                    Зарегистрироваться
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<a class="text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">
                Уже есть аккаунт? <span class="font-bold text-primary">Войти</span>
</a>
</div>
</main>
<!-- Suppressed BottomNavBar as per Transactional Flow rules -->
</body></html>
