name: CI - Code Quality & Tests

on:
  push:
    branches: [main, develop, notifications]
    paths:
      - 'backend/**/*.py'
      - 'frontend/**/*.vue'
      - 'frontend/**/*.ts'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop, notifications]
    paths:
      - 'backend/**/*.py'
      - 'frontend/**/*.vue'
      - 'frontend/**/*.ts'

jobs:
  python-lint:
    name: Python Linting & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install -e . --system
          pip install ruff black pytest pytest-asyncio

      - name: Lint with Ruff
        run: ruff check backend/ --extend-select C90
        continue-on-error: true

      - name: Format check with Black
        run: black --check backend/
        continue-on-error: true

      - name: Type check with Pyright
        run: pip install pyright && pyright backend/
        continue-on-error: true

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shoulder_to_shoulder_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install -e . --system
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/shoulder_to_shoulder_test
          REDIS_URL: redis://localhost:6379/0
          NATS_URL: nats://localhost:4222
          SECRET_KEY: test-secret-key
        run: |
          pytest backend/ -v --cov=backend/ --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/authorization/package-lock.json'

      - name: Install dependencies
        working-directory: frontend/authorization
        run: npm ci

      - name: Lint
        working-directory: frontend/authorization
        run: npm run lint
        continue-on-error: true

      - name: Type check
        working-directory: frontend/authorization
        run: npm run type-check
        continue-on-error: true

  security-check:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
