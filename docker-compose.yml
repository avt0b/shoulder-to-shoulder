services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: s2s_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shoulder_to_shoulder_db
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_stat_statements"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - s2s_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: s2s_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - s2s_network
    restart: unless-stopped

  # NATS Message Broker
  nats:
    image: nats:2-alpine
    container_name: s2s_nats
    ports:
      - "4222:4222"      # Client port
      - "8222:8222"      # HTTP monitoring port
    command: -m 8222 -js # Enable JetStream with monitoring
    networks:
      - s2s_network
    restart: unless-stopped

  # User Service
  user_service:
    build:
      context: .
      dockerfile: ./backend/user_service/Dockerfile
    container_name: s2s_user_service
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: User Service Плечом к плечу
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-in-production-please-use-64-characters-minimum-!!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      FIRST_SUPERUSER_EMAIL: admin@example.com
      FIRST_SUPERUSER_PASSWORD: admin123
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - s2s_network
    restart: unless-stopped

  # Notification Service
  notification_service:
    build:
      context: .
      dockerfile: ./backend/notification_service/Dockerfile
    container_name: s2s_notification_service
    ports:
      - "8001:8001"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: Notification Service Плечом к плечу
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-in-production-please-use-64-characters-minimum-!!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - s2s_network
    restart: unless-stopped

  # Event Service
  event_service:
    build:
      context: .
      dockerfile: ./backend/event_service/Dockerfile
    container_name: s2s_event_service
    ports:
      - "8002:8002"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: Event Service Плечом к плечу
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-in-production-please-use-64-characters-minimum-!!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - s2s_network
    restart: unless-stopped

  # Admin Service
  admin_service:
    build:
      context: .
      dockerfile: ./backend/admin_service/Dockerfile
    container_name: s2s_admin_service
    ports:
      - "8003:8003"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: Admin Service Плечом к плечу
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-in-production-please-use-64-characters-minimum-!!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - s2s_network
    restart: unless-stopped

  # Maps Service
  maps_service:
    build:
      context: .
      dockerfile: ./backend/maps_service/Dockerfile
    container_name: s2s_maps_service
    ports:
      - "8004:8004"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: Maps Service Плечом к плечу
      API_V1_STR: /api/v1
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - s2s_network
    restart: unless-stopped

  # Frontend (Vue.js)
  frontend:
    build:
      context: ./frontend/authorization
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_APP_ENV: development
        VITE_DEBUG: "true"
    container_name: s2s_frontend
    ports:
      - "3000:3000"
    networks:
      - s2s_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  s2s_network:
    driver: bridge
