name: shoulder-to-shoulder

x-backend-common: &backend-common
  restart: unless-stopped
  env_file:
    - ./.env
  networks:
    - s2s_network

services:
  postgres:
    image: postgres:16-alpine
    container_name: s2s_postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    # Not exposed publicly
    volumes:
      - ${PROJECT_ROOT}/.docker/postgres:/var/lib/postgresql/data
      - ${PROJECT_ROOT}/ops/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - s2s_network

  redis:
    image: redis:7-alpine
    container_name: s2s_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Not exposed publicly
    volumes:
      - ${PROJECT_ROOT}/.docker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - s2s_network

  nats:
    image: nats:2.10-alpine
    container_name: s2s_nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    # Not exposed publicly
    networks:
      - s2s_network

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: s2s_minio
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ${PROJECT_ROOT}/.docker/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - s2s_network

  user_service:
    <<: *backend-common
    container_name: s2s_user_service
    build:
      context: .
      dockerfile: ./backend/user_service/Dockerfile
      args:
        APP_HOME: ${APP_HOME}
        SERVICE_MODULE: backend.user_service.app.main:app
        SERVICE_PORT: 8000
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      PROJECT_NAME: ${USER_SERVICE_PROJECT_NAME}
      API_V1_STR: ${API_V1_STR}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NATS_URL: ${NATS_URL}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
    ports:
      - "${USER_SERVICE_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  notification_service:
    <<: *backend-common
    container_name: s2s_notification_service
    build:
      context: .
      dockerfile: ./backend/notification_service/Dockerfile
      args:
        APP_HOME: ${APP_HOME}
        SERVICE_MODULE: backend.notification_service.app.main:app
        SERVICE_PORT: 8001
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      PROJECT_NAME: ${NOTIFICATION_SERVICE_PROJECT_NAME}
      API_V1_STR: ${API_V1_STR}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NATS_URL: ${NATS_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      GATEWAY_URL: ${GATEWAY_URL}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  event_service:
    <<: *backend-common
    container_name: s2s_event_service
    build:
      context: .
      dockerfile: ./backend/event_service/Dockerfile
      args:
        APP_HOME: ${APP_HOME}
        SERVICE_MODULE: backend.event_service.app.main:app
        SERVICE_PORT: 8002
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      PROJECT_NAME: ${EVENT_SERVICE_PROJECT_NAME}
      API_V1_STR: ${API_V1_STR}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: ${NATS_URL}
    ports:
      - "${EVENT_SERVICE_PORT}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  admin_service:
    <<: *backend-common
    container_name: s2s_admin_service
    build:
      context: .
      dockerfile: ./backend/admin_service/Dockerfile
      args:
        APP_HOME: ${APP_HOME}
        SERVICE_MODULE: backend.admin_service.app.main:app
        SERVICE_PORT: 8003
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      PROJECT_NAME: ${ADMIN_SERVICE_PROJECT_NAME}
      API_V1_STR: ${API_V1_STR}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      NATS_URL: ${NATS_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL}
    ports:
      - "${ADMIN_SERVICE_PORT}:8003"
    # Not exposed publicly
    depends_on:
      nats:
        condition: service_started
      user_service:
        condition: service_started
      event_service:
        condition: service_started

  media_service:
    <<: *backend-common
    container_name: s2s_media_service
    build:
      context: .
      dockerfile: ./backend/media_service/Dockerfile
      args:
        APP_HOME: ${APP_HOME}
        SERVICE_MODULE: backend.media_service.app.main:app
        SERVICE_PORT: 8006
        UV_SYNC_EXTRA: boto3 botocore
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      PROJECT_NAME: ${MEDIA_SERVICE_PROJECT_NAME}
      API_V1_STR: ${API_V1_STR}
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: ${NATS_URL}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_BUCKET: ${MEDIA_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      AWS_PUBLIC_URL: ${AWS_PUBLIC_URL}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}
      ALLOWED_CONTENT_TYPES_STR: ${ALLOWED_CONTENT_TYPES_STR}
      ALLOWED_PURPOSES_STR: ${ALLOWED_PURPOSES_STR}
    ports:
      - "${MEDIA_SERVICE_PORT}:8006"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_healthy

  frontend:
    container_name: s2s_frontend
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./frontend/authorization/Dockerfile
      args:
        APP_HOME: ${APP_HOME}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_APP_ENV: ${VITE_APP_ENV}
        VITE_DEBUG: ${VITE_DEBUG}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      user_service:
        condition: service_started
    networks:
      - s2s_network

  maps_service:
    <<: *backend-common
    container_name: s2s_maps_service
    profiles:
      - maps
    build:
      context: .
      dockerfile: ./backend/maps_service/Dockerfile
      args:
        APP_HOME: ${APP_HOME}
        SERVICE_MODULE: backend.maps_service.main:app
        SERVICE_PORT: 8004
        UV_SYNC_EXTRA: loguru
    environment:
      APP_PORT: ${MAPS_SERVICE_PORT}
      PORT: ${MAPS_SERVICE_PORT}
      POSTGRES_URL: ${DATABASE_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      ALLOWED_ORIGINS: ${MAPS_ALLOWED_ORIGINS}
      TZ: ${TZ}
    # Not exposed publicly
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  s2s_network:
    driver: bridge
