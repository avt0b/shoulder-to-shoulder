services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: s2s_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shoulder_to_shoulder_db
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_stat_statements"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - s2s_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: s2s_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - s2s_network

  # NATS Message Broker
  nats:
    image: nats:2-alpine
    container_name: s2s_nats
    ports:
      - "4222:4222"      # Client port
      - "8222:8222"      # HTTP monitoring port
    command: -js         # Enable JetStream
    networks:
      - s2s_network

  # User Service
  user_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s2s_user_service
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: User Service Плечом к плечу
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-in-production-please-use-64-characters-minimum-!!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      FIRST_SUPERUSER_EMAIL: admin@example.com
      FIRST_SUPERUSER_PASSWORD: admin123
      PYTHONUNBUFFERED: "1"
    working_dir: /app/backend/user_service
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/user_service:/app/backend/user_service
    networks:
      - s2s_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Notification Service
  notification_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s2s_notification_service
    ports:
      - "8001:8001"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: Notification Service Плечом к плечу
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-in-production-please-use-64-characters-minimum-!!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    working_dir: /app/backend/notification_service
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/notification_service:/app/backend/notification_service
    networks:
      - s2s_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Event Service
  event_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s2s_event_service
    ports:
      - "8002:8002"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: Event Service Плечом к плечу
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-in-production-please-use-64-characters-minimum-!!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    working_dir: /app/backend/event_service
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/event_service:/app/backend/event_service
    networks:
      - s2s_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Admin Service
  admin_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s2s_admin_service
    ports:
      - "8003:8003"
    environment:
      ENVIRONMENT: development
      PROJECT_NAME: Admin Service Плечом к плечу
      API_V1_STR: /api/v1
      SECRET_KEY: super-secret-key-change-in-production-please-use-64-characters-minimum-!!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/shoulder_to_shoulder_db
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    working_dir: /app/backend/admin_service
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/admin_service:/app/backend/admin_service
    networks:
      - s2s_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Vue.js)
  frontend:
    build:
      context: ./frontend/authorization
      dockerfile: Dockerfile
    container_name: s2s_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_NATS_URL: ws://localhost:9222
    depends_on:
      - user_service
    volumes:
      - ./frontend/authorization:/app
      - /app/node_modules
    networks:
      - s2s_network

volumes:
  postgres_data:
  redis_data:

networks:
  s2s_network:
    driver: bridge
